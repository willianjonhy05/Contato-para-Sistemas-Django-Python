{% extends "base.html" %}

{% block content %}
<h1>Responder mensagem</h1>

<p><strong>Para:</strong> {{ contact_message.name }} &lt;{{ contact_message.email }}&gt;</p>
<p><strong>Assunto:</strong> {{ contact_message.subject }}</p>

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}

    <button type="submit">Registrar resposta</button>
    <a href="{% url 'contacts:staff_message_detail' contact_message.slug %}">Cancelar</a>
</form>
{% endblock %}
